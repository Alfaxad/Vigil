<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigil — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        @layer components {
            .liquid-glass-strong {
                background: rgba(255,255,255,0.03);
                background-blend-mode: luminosity;
                backdrop-filter: blur(50px);
                -webkit-backdrop-filter: blur(50px);
                border: none;
                box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
                position: relative;
                overflow: hidden;
            }
            .liquid-glass-strong::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: inherit;
                padding: 1.4px;
                background: linear-gradient(180deg,
                    rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%,
                    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
                    rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                pointer-events: none;
            }
        }

        :root {
            --bg: #050505;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --green: #22c55e;
            --red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-glow {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none; overflow: hidden;
        }
        .bg-glow .orb {
            position: absolute; border-radius: 50%;
            filter: blur(150px); opacity: 0.1;
        }
        .bg-glow .orb-1 {
            width: 400px; height: 400px;
            background: var(--green);
            top: -100px; left: -50px;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        .login-card {
            border-radius: 20px;
            padding: 40px 32px;
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 36px;
            font-weight: 400;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 8px;
        }
        .logo em { font-style: italic; color: var(--text-muted); }

        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 24px;
        }
        .form-input:focus {
            border-color: rgba(34, 197, 94, 0.5);
        }
        .form-input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--green);
            color: var(--bg);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .login-btn:hover { transform: scale(1.02); }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: var(--red);
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        .error-msg.show { display: block; }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .register-link a {
            color: var(--green);
            text-decoration: none;
        }
        .register-link a:hover { text-decoration: underline; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text); }

        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeRise 0.6s ease-out both; }
    </style>
</head>
<body>
    <div class="bg-glow"><div class="orb orb-1"></div></div>

    <div class="login-container anim">
        <div class="login-card liquid-glass-strong">
            <div class="logo">Vigil<em>.</em></div>
            <p class="login-subtitle">Sign in with your API key to access the dashboard.</p>

            <form id="login-form" onsubmit="handleLogin(event)">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="api-key-input"
                       placeholder="vgl_..." autocomplete="off" required>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            </form>

            <div class="error-msg" id="error-msg">Invalid API key. Register first to get one.</div>

            <p class="register-link">
                No account? <a href="/skill.md" target="_blank">Read skill.md</a> to register.
            </p>
        </div>

        <a href="/" class="back-link">Back to home</a>
    </div>

    <script>
    async function handleLogin(e) {
        e.preventDefault();
        var btn = document.getElementById('login-btn');
        var input = document.getElementById('api-key-input');
        var error = document.getElementById('error-msg');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        error.classList.remove('show');

        try {
            var resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: input.value.trim() })
            });

            if (resp.ok) {
                window.location.href = '/dashboard';
            } else {
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        } catch (err) {
            error.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }
    </script>
</body>
</html>
